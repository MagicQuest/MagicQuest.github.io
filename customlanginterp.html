        class Value {
            value;
            constructor(value) {
                this.value = value;
            }
            get(global) {
                return this.value;
            }
        }

        class VariableValue extends Value {
            constructor(varname) {
                super(varname);
            }
            get(global) {
                return global[this.value];
            }
        }

        class LabelValue extends VariableValue {
            interpreter;
            constructor(labelname, interpreter) {
                super(labelname);
                this.interpreter = interpreter;
            }
            get(global) {
                const $rip = super.get(global);
                return this.interpreter.execute.bind(this.interpreter, $rip);
            }
        }

        class PropertyVariableValue extends VariableValue {
            constructor(/** @type {Array<Value>} */ path) {
                super(path);
            }
            /*override*/ get(global) {
                //let parent = this.value[0].get(global); //global;
                //for(let i = 1; i < this.value.length; i++) {
                //    parent = parent[this.value[i].get(global)];
                //}
                let last;
                let parent = global;
                for(const p of this.value) {
                    last = parent;
                    parent = parent[p.get(global)];
                }
                if(parent instanceof Function) {
                    parent = parent.bind(last); //right?
                }
                return parent;
            }
            getParent(global) {
                let last;
                let parent = global;
                for(const p of this.value) {
                    last = parent;
                    parent = parent[p.get(global)];
                }
                return last;
            }
        }

        /*enum*/ class TokenKind {
            //static MNEMONIC = -1;
            static RESERVED = 1;
            static IDENTIFIER = 2;
            static STRING = 3;
            static NUMBER = 4;
            // static EXPRESSION = 5; //fack.
            static SUBSCRIPT_START = 5;
            static SUBSCRIPT_END = 6;
            static DOT = 7;
            static ARGUMENT_SEPARATOR = 8; //pedantic but hey i'm just writing what the grammar said ;)
            // static RESERVED = 9; // if i rewrite this again (for the third time) it would be so much easier if i just had a list of reserved words and only worried about where they appeared in the parser! (also yes RESERVED would replace MNEMONIC)
            //what else should become tokens... https://stackoverflow.com/questions/73226710/can-someone-explain-how-tokenizing-works-in-lexers
            // oh boy... this language is leveling up...
            static MINUS = 9;
            static DECREMENT = 10;
            static PLUS = 11;
            static INCREMENT = 12;
            static EXCLAMATION = 13;

            static isArithmetic(kind) {
                return kind == TokenKind.PLUS || kind == TokenKind.MINUS;
            }
        }

        class TransformedValue extends Value {
            //** @type {Operation} */
            transformation;
            passValueDirectly;
            constructor(/** @type {Value} */ value, /** @type {(global: Object, operand: any) => any} */ transformationCallback, /** @type {Boolean} */ passValueDirectly = false) {
                super(value);
                this.transformation = transformationCallback;
                this.passValueDirectly = passValueDirectly;
            }
            get(/** @type {Object} */ global) {
                //this.operation.execute(global); //uhh i guess he already has a reference to the value... (a little awkward but hush)
                if(!this.passValueDirectly) {
                    return this.transformation(global, this.value.get(global));
                }else {
                    return this.transformation(global, this.value);
                }
            }
            //i don't want these to be lambdas lol so i'm defining these here
            static plus(global, operand) {
                return +operand;
            }
            static minus(global, operand) {
                return -operand;
            }
            static not(global, operand) {
                return !operand;
            }
            //uh oh prefix and postfix operators don't like working on the same line so i think i'll have to change how these work so i can change the operand! (this was the first solution i thought of before i came up with pushing operations, but it seems like this was really the move after all...)
            //i'm gonna make separate functions for these for the speed lol
            static prefixIncrement(global, value) {
                //ok i know i was talking about speed lol but we're gonna do something lazy
                //yeah ok this is very dumb we're not doing that
                // const [parent, v] = SetOperation.prototype.get.call({varname: value}, global);
                // return ++parent[v];
                const [parent, v] = getVariableValueReference(global, value);
                return ++parent[v];
            }
            static postfixIncrement(global, value) {
                const [parent, v] = getVariableValueReference(global, value);
                return parent[v]++;
            }
            static prefixDecrement(global, value) {
                const [parent, v] = getVariableValueReference(global, value);
                return --parent[v];
            }
            static postfixDecrement(global, value) {
                const [parent, v] = getVariableValueReference(global, value);
                return parent[v]--;
            }
            static tkindmap = {
                [TokenKind.PLUS]: TransformedValue.plus,
                [TokenKind.MINUS]: TransformedValue.minus,
                [TokenKind.EXCLAMATION]: TransformedValue.not,
            };
            static transformationFromTokenKind(kind) {
                return TransformedValue.tkindmap[kind];
            }
        }

        class CallOperation extends Operation {
            /** @type {Value} */
            funcname;
            /** @type {Array<Value>} */
            args;
            constructor(/** @type {Value} */ funcname, /**@type {Array<Value>} */ args) {
                super();
                this.funcname = funcname;
                this.args = args;
            }
            execute(global) {
                let f = this.funcname.get(global);
                if(typeof(f) == "string") {
                    f = global[f];
                }
                global["$0"] = f(...this.args.map(arg=>arg.get(global)));
            }
        }

        function getVariableValueReference(global, varname) {
            let v, parent;
            if(varname instanceof PropertyVariableValue) {
                v = varname.value.at(-1).get(global); //should be the name right?
                parent = varname.getParent(global); //hmm...
            }else if(varname instanceof VariableValue) {
                v = varname.value;
                parent = global;
            }
            return [parent, v];
        }

        class MoveOperation extends SetOperation {

                super(varname, value);
            }
            execute(global) {
                const [parent, v] = getVariableValueReference(global, this.varname); //super.get(global);

            }

        class AddOperation extends SetOperation {
            interpreter; //we need to tell the interpreter to update its flags
            constructor(varname, amount, interpreter) {
                super(varname, amount);
                this.interpreter = interpreter;
            }
            execute(global) {
                const [parent, v] = getVariableValueReference(global, this.varname); //super.get(global);
                parent[v] += this.value.get(global);
                //CustomLangInterpreter.update_rflags(global, parent[v]);
                if(typeof(parent[v]) == "number") {
                    this.interpreter.update_rflags(parent[v]);
                }
            }
        }

        class CmpOperation extends Operation {
            interpreter;
            constructor(left, right, interpreter) {
                super();
                this.left = left;
                this.right = right;
                this.interpreter = interpreter;
            }
            execute(global) {
                const result = this.left.get(global) - this.right.get(global);
                this.interpreter.update_rflags(result);
            }
        }

        class JumpOperation extends Operation {
            constructor(position, conditions, values) {
                super();
                this.position = position;
                this.conditions = conditions;
                this.values = values;
            }
            execute(global) {
                //debugger;
                if(this.conditions == undefined) {
                    global.$rip = this.position.get(global)-1;
                }else {
                    let j = 0;
                    for(let i = 0; i < this.conditions.length; i++) {
                        j += global.$rflags[this.conditions[i]] == this.values[i];
                    }
                    if(j == this.conditions.length) {
                        global.$rip = this.position.get(global)-1;
                    }
                }
            }
        }

        class ReturnOperation extends Operation {
            retval;
            interpreter;
            constructor(retval, interpreter) {
                super();
                this.retval = retval;
                this.interpreter = interpreter;
            }
            execute(global) {
                //global.$0 = this.retval?.get(global);
                if(this.retval) {
                    global.$0 = this.retval.get(global);
                }
                global.$rip = this.interpreter.ast.length; //lazy ( we could subtract here since the loop increments $rip but it doesn't matter >:P )
            }
        }

        //based on std::expected, but this could've also been rust's Result if i was in my rust era again
        /** @template [T=object, K=object] */
        class Expected {
            /** @type {T?} */
            value;
            /** @type {K?} */
            error;
            /**
             * @param {T?} value
             * @param {K?} error
             */
            constructor(value, error = undefined) {
                this.value = value;
                this.error = error;
            }
            has_value() {
                return this.value != undefined;
            }
        }

        class ParseError {
            line;
            char;
            reason;
            constructor(line, char, reason) {
                this.line = line;
                this.char = char;
                this.reason = reason;
            }
            /** 
             * @param {String} source
             * @returns {String}
             */
            toString(source) {
                const lines = source.split("\n");
                let errorMessage = `Line: ${this.line}, Character: ${this.char}\n#### ${this.reason} ####\n${lines[this.line-1]}\n`;
                //for(let i = 0; i < this.char-1; i++) { // i feel like this loop is crazy but is there another way to do it (in javascript)
                //    errorMessage += " ";
                //}

                //oh yeah lol padStart i did it earlier
                errorMessage += "".padStart(this.char-1, " ");

                errorMessage += "^ HERE";
                // console.error(errorMessage);
                //throw errorMessage;
                return errorMessage;
            }
        }

            /** @returns {Expected<Value, ParseError>} */
            parseExpression(/** @type {Array<Token>} */ tokens, /** @type {{i: Number, ast: Array<Operation>, postfixOps: Array<Operation>, injectOperation: (operation: Operation) => void}} */ loop) {
                let value = undefined;
                let arithmetic = false;
                let prefixKind = undefined;
                let postfix = false;
                while_loop:
                while(loop.i < tokens.length) {
                    let temp = undefined;
                    const curToken = tokens[loop.i++];
                    switch(curToken.kind) {
                        case TokenKind.ARGUMENT_SEPARATOR:
                        case TokenKind.RESERVED:
                        case TokenKind.SUBSCRIPT_END:
                            loop.i--; //don't consume these tokens
                            break while_loop;
                        case TokenKind.PLUS:
                        case TokenKind.MINUS:
                        case TokenKind.EXCLAMATION:
                            if(arithmetic) {
                                if(curToken.kind == TokenKind.EXCLAMATION) {
                                    return new Expected(undefined, new ParseError(curToken.line, curToken.char, "What are YOU doing here?"));
                                }
                                //probably call parseExpression again for recursive goodness (however operator precedence, how?)
                            }else {
                                if(prefixKind) {
                                    return new Expected(undefined, new ParseError(curToken.line, curToken.char, "Unexpected math symbol here?"));
                                }
                                prefixKind = curToken.kind;
                            }
                            break;
                        case TokenKind.INCREMENT:
                        case TokenKind.DECREMENT: {
                            if(postfix) {
                                postfix = false;
                                if(curToken.kind == TokenKind.INCREMENT) {
                                    //loop.postfixOps.push(new AddOperation(value, new Value(1), this));
                                    //modifing value here is a little weird but i'm gonna ignore that
                                    value = new TransformedValue(value, TransformedValue.postfixIncrement, true);
                                }else {
                                    //loop.postfixOps.push(new AddOperation(value, new Value(-1), this));
                                    value = new TransformedValue(value, TransformedValue.postfixDecrement, true);
                                }
                            }else {
                                const lookahead = tokens[loop.i];
                                if(lookahead) {
                                    if(lookahead.kind == TokenKind.IDENTIFIER) {
                                        if(prefixKind) {
                                            return new Expected(undefined, new ParseError(curToken.line, curToken.char, "Unexpected math symbol here? (2)"));
                                        }
                                        prefixKind = curToken.kind;
                                    //else if(lookahead.kind == TokenKind.STRING || lookahead.kind == TokenKind.NUMBER) {
                                    //  return new Expected(undefined, new ParseError("I could let you do this but it would be weird, no incrementing/decrementing literals!"));
                                    //}
                                    }else {
                                        return new Expected(undefined, new ParseError(lookahead.line, lookahead.char, "Cannot increment/decrement this symbol!"));
                                    }
                                }else {
                                    return new Expected(undefined, new ParseError(lookahead.line, lookahead.char, `Line can't just end with '${curToken.value}'!`));
                                }
                            }
                            //let iforerror = loop.i;
                            //const result = this.parseExpression(tokens, loop);
                            //if(!result.has_value()) {
                            //    return result;
                            //}
                            //if(result.value.constructor.name == "Value" || result.value.constructor.name == "LabelValue") { //not allowed!
                            //    return new Expected(undefined, new ParseError(tokens[iforerror].line, tokens[iforerror].char, "increment/decrement only works on variables!"));
                            //}
                            break;
                        }
                        case TokenKind.NUMBER:
                        case TokenKind.STRING:
                            temp = new Value(curToken.value);
                            break;
                        case TokenKind.IDENTIFIER: {
                            loop.i--; // parseIdentifierPropertyAccess wants to see le identifier
                            const result = this.parseIdentifierPropertyAccess(tokens, loop);
                            if(!result.has_value()) {
                                return result;
                            }
                            temp = result.value;
                            break;
                        }
                        case TokenKind.DOT:
                            return new Expected(undefined, new ParseError(curToken.line, curToken.char, `Unexpected '${curToken.value}', literals don't have properties (yet)!`));
                            break;
                        default:
                            return new Expected(undefined, new ParseError(curToken.line, curToken.char, "Expected string, number, or variable name!"));
                            break;
                    }
                    if(!value && temp) {
                        if(prefixKind) {
                            if(temp.constructor.name == "Value") {
                                switch(prefixKind) {
                                    case TokenKind.PLUS:
                                        temp.value = +temp.value;
                                        break;
                                    case TokenKind.MINUS:
                                        temp.value = -temp.value;
                                        break;
                                    case TokenKind.EXCLAMATION:
                                        temp.value = !temp.value;
                                        break;
                                    default:
                                        return new Expected(undefined, new ParseError(curToken.line, curToken.char, `Cannot use '${curToken.value}' on literal!`));
                                        break;
                                }
                            }else if(temp.constructor.name == "LabelValue") {
                                if(prefixKind == TokenKind.PLUS) { // by using +label you can get the actually number instead of the bound function (if for some reason you needed that)
                                    //temp = new TransformedValue(new VariableValue(temp.value), TransformedValue.plus);
                                    temp = new VariableValue(temp.value);
                                }else {
                                    return new Expected(undefined, new ParseError(curToken.line, curToken.char, `Operator not allowed on label!`));
                                }
                            }else {
                                switch(prefixKind) {
                                    case TokenKind.PLUS:
                                    case TokenKind.MINUS:
                                    case TokenKind.EXCLAMATION:
                                        temp = new TransformedValue(temp, TransformedValue.transformationFromTokenKind(prefixKind));
                                        break;
                                    case TokenKind.INCREMENT:
                                        //syntactic sugar, we need to put an inc instruction before this line! (oh fuck this totally thrashes labels)
                                        //aw shit labels what will we do
                                        //this is lowkey the second time i've written this and i still don't know if it works!
                                        //loop.injectOperation(new AddOperation(temp, new Value(1), this));
                                        temp = new TransformedValue(temp, TransformedValue.prefixIncrement, true);
                                        break;
                                    case TokenKind.DECREMENT:
                                        // loop.injectOperation(new AddOperation(temp, new Value(-1), this));
                                        temp = new TransformedValue(temp, TransformedValue.prefixDecrement, true);
                                        break;
                                }
                            }
                            prefixKind = undefined;
                        }
                        value = temp;
                        //now we can check when value is first set
                        const lookahead = tokens[loop.i];
                        if(lookahead) {
                            if(TokenKind.isArithmetic(lookahead.kind)) {
                                arithmetic = true;
                                return new Expected(undefined, new ParseError(lookahead.line, lookahead.char, "We can't do arithmetic expressions yet!"));
                            }else if(lookahead.kind == TokenKind.INCREMENT || lookahead.kind == TokenKind.DECREMENT) {
                                if(value.constructor.name == "Value" || value.constructor.name == "LabelValue") {
                                    return new Expected(undefined, new ParseError(lookahead.line, lookahead.char, "Incrementing/decrementing only works on variables!"));
                                }
                                postfix = true;
                            }else if(lookahead.kind == TokenKind.STRING || lookahead.kind == TokenKind.NUMBER || lookahead.kind == TokenKind.IDENTIFIER) { //yeah this is probably right :)
                                return new Expected(undefined, new ParseError(lookahead.line, lookahead.char, "Unexpected symbols following value! (you probably want to separate them with commas/dots, maybe?)"));
                            }
                        }
                    }
                }
                return new Expected(value);
            }

            /** @returns {Expected<Value, ParseError>} */
            parseIdentifierPropertyAccess(/** @type {Array<Token>} */ tokens, loop) {
                let value;
                
                let awaitingAccess = false;

                let bracketdepth = 0; //and here i though we wouldn't need this one
                
                /** @type {Array<Value>} */
                const path = [];
                
                tokenLoop:
                while(loop.i < tokens.length) {
                    const curToken = tokens[loop.i++];
                    switch(curToken.kind) {
                        case TokenKind.ARGUMENT_SEPARATOR:
                        case TokenKind.RESERVED:
                        case TokenKind.PLUS:
                        case TokenKind.MINUS:
                        case TokenKind.EXCLAMATION:
                        case TokenKind.INCREMENT:
                        case TokenKind.DECREMENT:
                            loop.i--; //don't consume these tokens
                            break tokenLoop;
                        case TokenKind.IDENTIFIER: {
                            if(awaitingAccess) {
                                // return new Expected(undefined, new ParseError(curToken.line, curToken.char, "Expected property access ('.' or '[')"));
                                return new Expected(undefined, new ParseError(curToken.line, curToken.char, "Two identifiers cannot just follow each other brobro (use a dot to access properties)"));
                            }
                            awaitingAccess = true;
                            //const lookahead = tokens[loop.i];
                            path.push(new Value(curToken.value));
                            break;
                        }
                        case TokenKind.DOT:
                            if(awaitingAccess) {
                                awaitingAccess = false;
                            }else {
                                return new Expected(undefined, new ParseError(curToken.line, curToken.char, "Unexpected dot!"));
                            }
                            break;
                        case TokenKind.SUBSCRIPT_START: {
                            bracketdepth++;
                            //if(awaitingAccess) {
                            //    awaitingAccess = false; //actually we'd expect a dot after this
                            //}else {
                            //    return new Expected(undefined, new ParseError(curToken.line, curToken.char, "Unexpected bracket!"));
                            //}
            
                            //wait the lexer will tell us if this happens
                            //const lookahead = tokens[loop.i];
                            //if(!lookahead) {
                            //    return new Expected(undefined, new ParseError(curToken.line, curToken.char, `Line can't just end with '${curToken.value}'`));
                            //}//else if(lookahead.kind == ) {
            
                            //}
            
                            const result = this.parseExpression(tokens, loop);
                            if(!result.has_value()) {
                                return result;
                            }
                            path.push(result.value);
                            break;
                        }

                        case TokenKind.SUBSCRIPT_END:
                            // break tokenLoop;
                            // break; //?
                            bracketdepth--;
                            if(bracketdepth < 0) { //this may happen with a line like global[variable].name, we don't want to keep parsing if we've left our bracket (thing)
                                loop.i--; // don't consume subscript end so it can propagate up
                                break tokenLoop;
                            }
                            break;
                    }
                }
                
                if(path.length == 1) {
                    //a lone identifier, it could be a label so we need to check
                    if(path[0].value in this.labels) { // when we call certain instructions, we need to know if the arguments are labels or not
                        value = new LabelValue(path[0].value, this);
                    }else {
                        value = new VariableValue(path[0].value); //lol
                    }
                }else {
                    value = new PropertyVariableValue(path);
                }

                return new Expected(value);
            }
