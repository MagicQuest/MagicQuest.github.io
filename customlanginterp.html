        class Value {
            constructor(value) {
                this.value = value;
            }
            get(global) {
                return this.value;
            }
        }

        class VariableValue extends Value {
            constructor(varname) {
                super(varname);
            }
            get(global) {
                return global[this.value];
            }
        }

        class PropertyVariableValue extends VariableValue {
            constructor(path) {
                super(path);
            }
            /*override*/ get(global) {
                //let parent = this.value[0].get(global); //global;
                //for(let i = 1; i < this.value.length; i++) {
                //    parent = parent[this.value[i].get(global)];
                //}
                let last;
                let parent = global;
                for(const p of this.value) {
                    last = parent;
                    parent = parent[p.get(global)];
                }
                if(parent instanceof Function) {
                    parent = parent.bind(last); //right?
                }
                return parent;
            }
            getParent(global) {
                let last;
                let parent = global;
                for(const p of this.value) {
                    last = parent;
                    parent = parent[p.get(global)];
                }
                return last;
            }
        }

        class Operation {
            execute(global) {} // = 0;
        }

        class CallOperation extends Operation {
            /** @type {Value} */
            funcname;
            /** @type {Array<Value>} */
            args;
            constructor(/** @type {Value} */ funcname, /**@type {Array<Value>} */ args) {
                super();
                this.funcname = funcname;
                this.args = args;
            }
            execute(global) {
                let f = this.funcname.get(global);
                if(typeof(f) == "string") {
                    f = global[f];
                }
                global["$0"] = f(...this.args.map(arg=>arg.get(global)));
            }
        }

        class SetOperation extends Operation {
            constructor(varname, value) {
                super();
                this.varname = varname;
                this.value = value;
            }
            get(global) {
                let v, parent;
                if(this.varname instanceof PropertyVariableValue) {
                    v = this.varname.value.at(-1).get(global); //should be the name right?
                    parent = this.varname.getParent(global); //hmm...
                }else if(this.varname instanceof VariableValue) {
                    v = this.varname.value;
                    parent = global;
                }
                return [parent, v];
            }
        }

        class MoveOperation extends SetOperation {
            constructor(varname, value) {
                super(varname, value);
            }
            execute(global) {
                const [parent, v] = super.get(global);
                parent[v] = this.value.get(global);
            }
        }

        class AddOperation extends SetOperation {
            constructor(varname, amount) {
                super(varname, amount);
            }
            execute(global) {
                const [parent, v] = super.get(global);
                parent[v] += this.value.get(global);
                CustomLangInterpreter.update_rflags(global, parent[v]);
            }
        }

        class MulOperation extends SetOperation {
            constructor(varname, amount) {
                super(varname, amount);
            }
            execute(global) {
                const [parent, v] = super.get(global);
                parent[v] *= this.value.get(global);
                CustomLangInterpreter.update_rflags(global, parent[v]);
            }
        }

        class DivOperation extends SetOperation {
            constructor(varname, amount) {
                super(varname, amount);
            }
            execute(global) {
                const [parent, v] = super.get(global);
                parent[v] /= this.value.get(global);
                CustomLangInterpreter.update_rflags(global, parent[v]);
            }
        }

        class CmpOperation extends Operation {
            constructor(left, right) {
                super();
                this.left = left;
                this.right = right;
            }
            execute(global) {
                const result = this.left.get(global) - this.right.get(global);
                CustomLangInterpreter.update_rflags(global, result);
            }
        }

        class JumpOperation extends Operation {
            constructor(position, conditions, values) {
                super();
                this.position = position;
                this.conditions = conditions;
                this.values = values;
            }
            execute(global) {
                debugger;
                if(this.conditions == undefined) {
                    global.$rip = this.position.get(global)-1;
                }else {
                    let j = 0;
                    for(let i = 0; i < this.conditions.length; i++) {
                        j += global.$rflags[this.conditions[i]] == this.values[i];
                    }
                    if(j == this.conditions.length) {
                        global.$rip = this.position.get(global)-1;
                    }
                }
            }
        }

        class Expected {
            value;
            error;
            constructor(value, error = undefined) {
                this.value = value;
                this.error = error;
            }
            has_value() {
                return this.value != undefined;
            }

        class ParseError {
            line;
            char;
            reason;
            constructor(line, char, reason) {
                this.line = line;
                this.char = char;
                this.reason = reason;
            }
            toString(source) {
                const lines = source.split("\n");
                let errorMessage = `Line: ${this.line}, Character: ${this.char}\n#### ${this.reason} ####\n${lines[this.line-1]}\n`;
                //for(let i = 0; i < this.char-1; i++) { // i feel like this loop is crazy but is there another way to do it (in javascript)
                //    errorMessage += " ";
                //}

                //oh yeah lol padStart i did it earlier
                errorMessage += "".padStart(this.char-1, " ");

                errorMessage += "^ HERE";
                // console.error(errorMessage);
                //throw errorMessage;
                return errorMessage;
            }
        }

            lex(str) {

                let seenInstruction = false;

                const identifierRegex = /\w+/;

                const numberRegex = /[\-+]?(?:(?:0x[0-9a-fA-F]+)|(?:[0-9]+(?:\.[0-9]+)?))/; // for matching hex and floating point :) (i feel like i'm abusing non capture groups but how else will i do it)

                for(let i = 0; i < str.length; i++) {
                    const char = str[i];

                        readingString = !readingString;
                        if(readingString) {
                            current.line = lineNumber;
                            current.char = charNumber;
                            current.kind = TokenKind.STRING;
                            current.value = "";

                        //

                        //technically with the way i just wrote this you could have a label and an instruction in the same line (exactly in that order)
                        let lowest = Infinity;
                        const untilnewline = str.indexOf('\n', i);
                        if(untilnewline != -1) {
                            lowest = untilnewline;
                        }
                        const untilcomma = str.indexOf(',', i);
                        if(untilcomma != -1) {
                            lowest = Math.min(lowest, untilcomma);
                        }
                        // let untilspaceornewline;
                        // if(untilnewline != -1) {

                        const untilspace = str.indexOf(' ', i);

                        if(lowest == Infinity) {
                            //well fuck.
                            //return new Expected(undefined, new ParseError(lineNumber, charNumber, "Unexpected line ending! Surely there's more to it than that!"));

                            //in this situation it could be an instruction with no arguments, or a label!
                            lowest = str.length;

                            //if(matches == null) {
                            //    return new Expected(undefined, new ParseError(lineNumber, charNumber, "Uhh there are no numbers, symbols, or uppercase letters allowed in instruction mnemonics!"));

                                const labelmatches = line_text.match(identifierRegex); //identifier regex doesn't include the colon so we'll just check lol
                                if(labelmatches != null && labelmatches[0].length == line_text.length-1 && line_text[line_text.length-1] == ':') { //i guess bro

                                    this.identifiers[labelmatches[0]] = instructionNumber; //ok we can't use lineNumber since there might be comments and other labels which aren't included in the ast!

                                current.value = parseFloat(line_text);

                            charNumber += line_text.length-1; //probably
                        }else {
                            i += line_text.length; // no - 1 to skip the space
                            charNumber += line_text.length; //probably
                        }
                    }

                }

                //fortunately it's still easy to actually evaluate the ast so we can just plug and play :3c
                for(this.globals.$rip; this.globals.$rip < ast.length; this.globals.$rip++) {
                    const op = ast[this.globals.$rip];
                    op.execute(this.globals);
                }
            }
        }
        
        document.getElementById("execute").addEventListener("click", function(event) {
            //const interpreter = new interpreters[lang.value];
            //interpreter.interpret(letext.value);
            const lang = new CustomLangInterpreter();
            lang.interpret(letext.value);
        });
    </script>
</body>
