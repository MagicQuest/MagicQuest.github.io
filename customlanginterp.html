        class Value {
            constructor(value) {
                this.value = value;
            }
            get(global) {
                return this.value;
            }
        }

        class VariableValue extends Value {
            constructor(varname) {
                super(varname);
            }
            get(global) {
                return global[this.value];
            }
        }

        class PropertyVariableValue extends VariableValue {
            constructor(path) {
                super(path);
            }
            /*override*/ get(global) {
                //let parent = this.value[0].get(global); //global;
                //for(let i = 1; i < this.value.length; i++) {
                //    parent = parent[this.value[i].get(global)];
                //}
                let last;
                let parent = global;
                for(const p of this.value) {
                    last = parent;
                    parent = parent[p.get(global)];
                }
                if(parent instanceof Function) {
                    parent = parent.bind(last); //right?
                }
                return parent;
            }
            getParent(global) {
                let last;
                let parent = global;
                for(const p of this.value) {
                    last = parent;
                    parent = parent[p.get(global)];
                }
                return last;
            }
        }

        class Operation {
            execute(global) {} // = 0;
        }

        class CallOperation extends Operation {
            constructor(funcname, args) {
                super();
                this.funcname = funcname;
                this.args = args;
            }
            execute(global) {
                let f = this.funcname.get(global);
                if(typeof(f) == "string") {
                    f = global[f];
                }
                global["$0"] = f(...this.args.map(arg=>arg.get(global)));
            }
        }

        class SetOperation extends Operation {
            constructor(varname, value) {
                super();
                this.varname = varname;
                this.value = value;
            }
            get(global) {
                let v, parent;
                if(this.varname instanceof PropertyVariableValue) {
                    v = this.varname.value.at(-1).get(global); //should be the name right?
                    parent = this.varname.getParent(global); //hmm...
                }else if(this.varname instanceof VariableValue) {
                    v = this.varname.value;
                    parent = global;
                }
                return [parent, v];
            }
        }

        class MoveOperation extends SetOperation {
            constructor(varname, value) {
                super(varname, value);
            }
            execute(global) {
                const [parent, v] = super.get(global);
                parent[v] = this.value.get(global);
            }
        }

        class AddOperation extends SetOperation {
            constructor(varname, amount) {
                super(varname, amount);
            }
            execute(global) {
                const [parent, v] = super.get(global);
                parent[v] += this.value.get(global);
                CustomLangInterpreter.update_rflags(global, parent[v]);
            }
        }

        class MulOperation extends SetOperation {
            constructor(varname, amount) {

        class CmpOperation extends Operation {
            constructor(left, right) {
                super();
                this.left = left;
                this.right = right;
            }
            execute(global) {
                const result = this.left.get(global) - this.right.get(global);
                CustomLangInterpreter.update_rflags(global, result);
            }
        }

        class JumpOperation extends Operation {
            constructor(position, conditions, values) {
                super();
                this.position = position;
                this.conditions = conditions;
                this.values = values;
            }
            execute(global) {
                debugger;
                if(this.conditions == undefined) {
                    global.$rip = this.position.get(global)-1;
                }else {
                    let j = 0;
                    for(let i = 0; i < this.conditions.length; i++) {
                        j += global.$rflags[this.conditions[i]] == this.values[i];
                    }
                    if(j == this.conditions.length) {
                        global.$rip = this.position.get(global)-1;
                    }
                }
            }
        }

                    this: globalThis, //would be script in lua
                    $0: undefined,    //return value
                    true: true,
                    false: false,
                    undefined,
                    Math,             //standard like js
                    $rip: 0,
                    $rflags: {zero: 0, sign: 0},
                    $labels: {},
                };
            }

            static update_rflags(g, result) {
                g.$rflags.zero = result == 0;
                g.$rflags.sign = Math.sign(result);
            }

            static handle_string(errinfo, _, char) {

                        if(!_.string.backslash) {

                            _.string.was = true;
                            //_.args.push(_.value);
                            //_.value = "";
                        }else {
                            _.value += char;
                        }
                        _.string.backslash = false;
                        break;
                    case "\\":
                        _.string.backslash = true;
                        break;
                    default:
                        if(_.string.backslash) {
                            _.string.backslash = false;
                            switch(char) {
                                case 'n':
                                    char = '\n';
                                    break;
                                case 't':
                                    char = '\t';
                                    break;
                                default:
                                    CustomLangInterpreter.throw(errinfo, "ESCAPE CHARACTER NOT IMPLEMENTED", "\\"+char);
                                    break;
                            }
                        }
                        _.value += char;
                        break;
                }

                        if(char == "[") {
                            bracketdepth++;
                        }else if(char == "]") {
                            bracketdepth--;
                        }
                        _.value += char;
                    }
                }

                            }

                            case "mov":
                                if(_.args[0] instanceof VariableValue) {
                                    ast.push(new MoveOperation(_.args[0], _.args[1])); //accessing _.args[0].value directly to get the variable name :)
                                }else {
                                    CustomLangInterpreter.throw(errinfo, "MOV MUST TAKE VARIABLE AS FIRST PARAMETER", _.args[0].value);
                                }
                                break;
                            case "inc":
                            case "dec":
                            case "add":
                                let amount;
                                if(_.instruction == "inc") {
                                    amount = new Value(1);
                                }else if(_.instruction == "dec") {
                                    amount = new Value(-1)
                                }else {
                                    amount = _.args[1];
                                }
                                if(_.args[0] instanceof VariableValue) {
                                    ast.push(new AddOperation(_.args[0], amount)); //accessing _.args[0].value directly to get the variable name :)
                                }else {
                                    CustomLangInterpreter.throw(errinfo, "ADD MUST TAKE VARIABLE AS FIRST PARAMETER", _.args[0].value);
                                }
                                break;
                            case "mul":
                            case "div":
                                const Type = _.instruction == "mul" ? MulOperation : DivOperation;
                                if(_.args[0] instanceof VariableValue) {
                                    ast.push(new Type(_.args[0], _.args[1])); //accessing _.args[0].value directly to get the variable name :)
                                }else {
                                    CustomLangInterpreter.throw(errinfo, `${_.instruction.toUpperCase()} MUST TAKE VARIABLE AS FIRST PARAMETER`, _.args[0].value);
                                }
                                break;
                            case "int3":
                                ast.push(new DebugbreakOperation());
                                break;
                            //case "if":
                            //    if(_.args.length < 3) {
                            //        CustomLangInterpreter.throw(lines, indexforerror, "IF INSTRUCTION TAKES 3 PARAMETERS", ",");
                            //    }
                            //    for() {
                            //        if(!(arg instanceof VariableValue)) {
                            //
                            //        }
                            //    }
                            //    ast.push(new IfOperation(_.args));
                            //    break;
                            case "cmp":
                                ast.push(new CmpOperation(_.args[0], _.args[1]));
                                break;
                            case "jmp":
                                ast.push(new JumpOperation(_.args[0], undefined, undefined));
                                break;
                            case "je":
                                ast.push(new JumpOperation(_.args[0], ["zero"], [1]));
                                break;
                            case "jne":
                                ast.push(new JumpOperation(_.args[0], ["zero"], [0]));
                                break;
                            default:
                                CustomLangInterpreter.throw(errinfo, "UNKNOWN INSTRUCTION", _.instruction);
                                break;
                        }
                    //}
                }
                return ast;
            }

            /*override*/ execute(ast) {
                //for(const op of ast) {
                this.globals = CustomLangInterpreter.setup_globals();
                for(this.globals.$rip = 0; this.globals.$rip < ast.length; this.globals.$rip++) {
                    const op = ast[this.globals.$rip];
                    op.execute(this.globals);
                }
            }
        }

        document.getElementById("execute").addEventListener("click", function(event) {
            //const interpreter = new interpreters[lang.value];
            //interpreter.interpret(letext.value);
            const lang = new CustomLangInterpreter();
            lang.interpret(letext.value);
        });
    </script>
