		function selectExample(/** @type {InputEvent} */ event) {
			letext.value = examples[event.target.value];
		}
		selectExample({target: example_selection});

        //expressions can happen after semicolons, in parenthesis and at the beginning of lines
        //if a line starts with a reserved word we should switch based on the value
        
        //based on std::expected, but this could've also been rust's Result if i was in my rust era again
        /** @template [T=object, K=object] */
        class Expected {
            /** @type {T?} */
            value;
            /** @type {K?} */
            error;
            /**
             * @param {T?} value
             * @param {K?} error
             */
            constructor(value, error = undefined) {
                this.value = value;
                this.error = error;
            }
            has_value() {
                return this.value != undefined;
            }
        }

        function Unexpected(error) {
            return new Expected(undefined, error);
        }

        class ParseError {
            line;
            char;
            reason;
            constructor(line, char, reason) {
                this.line = line;
                this.char = char;
                this.reason = reason;
            }
            /** 
             * @param {String} source
             * @returns {String}
             */
            toString(source) {
                const lines = source.split("\n");
                let errorMessage = `Line: ${this.line}, Character: ${this.char}\n#### ${this.reason} ####\n${lines[this.line-1]}\n`;
                //for(let i = 0; i < this.char-1; i++) { // i feel like this loop is crazy but is there another way to do it (in javascript)
                //    errorMessage += " ";
                //}

                //oh yeah lol padStart i did it earlier
                errorMessage += "".padStart(this.char-1, " ");

                errorMessage += "^ HERE";
                // console.error(errorMessage);
                //throw errorMessage;
                return errorMessage;
            }
        }

        class Token {
            line;
            char;
            kind;
            value;
            constructor(line, char, kind, value) {
                this.line = line;
                this.char = char;
                this.kind = kind;
                this.value = value;
            }
        }

        /*enum*/ class TokenKind {
            static RESERVED = 1;
            static IDENTIFIER = 2;
            static STRING = 3;
            static NUMBER = 4;
            static BIGINT = 5;
            static BOOLEAN = 6;
            static UNDEFINED = 7;
            static NULL = 8;
            static TEMPLATE_EXPRESSION = 9; //weird...
            static GENDER = 10;
            static OPEN_BRACKET = 11;
            static CLOSING_BRACKET = 12;
            static DOT = 13;
            //what else should become tokens... https://stackoverflow.com/questions/73226710/can-someone-explain-how-tokenizing-works-in-lexers
            static OPEN_PARENTHESIS = 14;
            static CLOSING_PARENTHESIS = 15;
            //operators
            static PLUS = 16;
            static MINUS = 17;
            static ASTERISK = 18;
            static SLASH = 19;
            static EXCLAMATION = 20;
            static DECREMENT = 21;
            static INCREMENT = 22;
            static OPTIONAL_CHAINING = 23;
            static BITWISE_NOT = 24;
            static EXPONENTIATION = 25;
            static REMAINDER = 26;
            static LESS_THAN = 27;
            static GREATER_THAN = 28;
            static LESS_EQUAL = 29;
            static GREATER_EQUAL = 30;
            static EQUAL_EQUAL = 31;
            static NOT_EQUAL = 32;
            static STRICT_EQUAL = 33;
            static STRICT_NOT_EQUAL = 34;
            static BITWISE_SHIFT_LEFT = 35;
            static BITWISE_SHIFT_RIGHT = 36;
            static BITWISE_UNSIGNED_SHIFT_RIGHT = 37;
            static BITWISE_AND = 38;
            static BITWISE_OR = 39;
            static BITWISE_XOR = 40;
            static LOGICAL_AND = 41;
            static LOGICAL_OR = 42;
            static NULLISH_COALESCING = 43;
            static QUESTION = 44; //for ternary
            static COLON = 45;
            static EQUALS = 46;
            static MUL_EQUALS = 47;
            static DIV_EQUALS = 48;
            static REMAINDER_EQUALS = 49;
            static PLUS_EQUALS = 50;
            static MINUS_EQUALS = 51;
            static BITWISE_SHIFT_LEFT_EQUALS = 52;
            static BITWISE_SHIFT_RIGHT_EQUALS = 53;
            static BITWISE_UNSIGNED_SHIFT_RIGHT_EQUALS = 54;
            static BITWISE_AND_EQUALS = 55;
            static BITWISE_XOR_EQUALS = 56;
            static BITWISE_OR_EQUALS = 57;
            static EXPONENTIATION_EQUALS = 58;
            static LOGICAL_AND_EQUALS = 59;
            static LOGICAL_OR_EQUALS = 60;
            static NULLISH_COALESCING_EQUALS = 61;
            static COMMA = 62;
            static SPREAD = 63;
            static SEMICOLON = 64;
            static OPEN_CURLY_BRACKET = 65;
            static CLOSING_CURLY_BRACKET = 66;
        }

        class Interpreter {
            /** 
             * @param {String} str
             * @returns {Expected<Array, ParseError>}
             * */
            parse(str) {} // = 0;
            interpret(str) {
                const result = this.parse(str);
                if(!result.has_value()) {
                    const err = result.error.toString(str);
                    letext.style.backgroundColor = "pink";
                    //addConsoleText(true, [err]);
                    const temp = err.split("\n");
                    temp[temp.length-1] = "(this font isn't monospace so see the console for the correct character position)";
                    letext.setAttribute("title", temp.join("\n"));
                    throw err;
                }
                letext.style.backgroundColor = "";
                letext.removeAttribute("title");
                console.log(result.value);
                //etc...
            }
        }

        class Lexer {
            /** @type {Interpreter} */
            interpreter;
            /** @param {Interpreter} interpreter */
            constructor(interpreter) {
                this.interpreter = interpreter;
            }
        }

        class Environment {
            //in javascript we do!
            static hasBigNumbers() {
                return true;
            }
        }

        //lexical grammar for javascript
        //https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Lexical_grammar
        //we're not doing that identifier unicode escape sequence shit lol (actually maybe it wouldn't be TOO hard)
        //my number production rule implies that 100e+2e+2 and 0755n are valid but we'll fix that in post
        //identifier ::= /[$_\p{ID_Start}][$\p{ID_Continue}]*/u
        //number ::= sign? ((hex | octal | binary) | ([0-9]* ('.' [0-9]*)?)) ('n' | ([eE] number))?
        //hex ::= '0' [xX] [0-9a-fA-F]+
        //octal ::= '0' [oO] [0-7]+
        //binary ::= '0' [bB] [0-1]+
        //sign ::= '+' | '-'
        //string ::= (["'`]).+\1
        //regex ::= '/' .+ '/' [gimsuy]*
        class JavascriptLexer extends Lexer {
            static reserved = new Map([
                //regular
                ["break", true],
                ["case", true],
                ["catch", true],
                ["class", true],
                ["const", true],
                ["continue", true],
                ["debugger", true],
                ["default", true],
                ["delete", true],
                ["do", true],
                ["else", true],
                ["export", true],
                ["extends", true],
                ["false", true],
                ["finally", true],
                ["for", true],
                ["function", true],
                ["if", true],
                ["import", true],
                ["in", true],
                ["instanceof", true],
                ["new", true],
                ["null", true],
                ["return", true],
                ["super", true],
                ["switch", true],
                ["this", true],
                ["throw", true],
                ["true", true],
                ["try", true],
                ["typeof", true],
                ["var", true],
                ["void", true],
                ["while", true],
                ["with", true],

                //strict mode
                // ["let", true],
                // ["static", true],
                // ["yield", true],

                //in modules or async functions (wait a second, doesn't that make javascript context... sensitive?!)
                ["await", true],

                //future reserved
                ["enum", true],

                //strict mode
                // ["implements", true],
                // ["interface", true],
                // ["package", true],
                // ["private", true],
                // ["protected", true],
                // ["public", true]
            ]);

            static strict_reserved = new Map([
                //regular
                ["let", true],
                ["static", true],
                ["yield", true],

                //future reserved
                ["implements", true],
                ["interface", true],
                ["package", true],
                ["private", true],
                ["protected", true],
                ["public", true]
            ]);

            i = 0;

            /** @param {JavascriptInterpreter} parentInterpreter */
            constructor(parentInterpreter) {
                super(parentInterpreter);
            }

            /** 
             * @param {String} str
             * @returns {Expected<Array<Token>, ParseError>} */
            lex(str, readingTemplate = false) {
                debugger;

                /** @type {Array<Token>} */
                const tokens = [];

                //let i = 0;
                let lineNumber = 1;
                let lineIndex = 0;

                let useStrict = false;

                let depth = {
                    parenthesis: 0,
                    bracket: 0,
                    curly: +readingTemplate
                };

                if(str.length > 1) {
                    if(str[0] == '#' && str[1] == '!') {
                        str = str.replace("#!", "//"); //lol
                    }
                }

                const isNumberRegex = /[0-9]/;
                const identifierStartRegex = /[$_\p{ID_Start}]/u;
                const identifierRegex = /[$\p{ID_Continue}]/u;

                const hexRegex = /[0-9a-f_]/i;
                const octalRegex = /[0-7_]/;

                templateStopLexing:
                while(this.i < str.length) {
                    const char = str[this.i++];
                    const charNumber = this.i - lineIndex;
                    switch(char) {
                        //https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Lexical_grammar#white_space
                        case '\t':
                        case '\v':
                        case '\f':
                        case ' ':
                        case '\r': //probably fine
                        case '\u00A0': //nbsp
                        case '\uFEFF': //bom marker
                        //<USP>...
                            continue;

                        case '/':
                            if(str[this.i] == '/') {
                                //comment
                                this.i = str.indexOf("\n", this.i);
                                if(this.i == -1) this.i = str.length;
                            }else if(str[this.i] == '*') {
                                //multiline comment
                                const target = str.indexOf("*/", this.i)+2;
                                while((this.i = str.indexOf("\n", this.i)+1) < target) { //uhh probably right
                                    lineNumber++;
                                    lineIndex = this.i;
                                }
                                this.i = target;
                                if(this.i == -1) this.i = str.length;
                            }else if(str[this.i] == '=') {
                                //consume =
                                this.i++;
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.DIV_EQUALS, "/="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.SLASH, "/"));
                            }
                            break;

                        case '\n': //automagic semicolon insertion...
                            lineNumber++;
                            lineIndex = this.i;
                            break;

                        case '"':
                        case '\'':
                        case '`': {
                            const stringToken = new Token(lineNumber, charNumber, TokenKind.STRING, "");
                            let escaped = false;
                            let ended = false;
                            while(this.i < str.length) {
                                if(str[this.i] == char) {
                                    this.i++; //consume ending quote
                                    ended = true;
                                    break;
                                }
                                if(str[this.i] == '\n') {
                                    lineNumber++;
                                    lineIndex = this.i;
                                    this.i++; //consume newline
                                    if(!escaped) {
                                        if(char == '`') {
                                            //backtick allows multiline string
                                            stringToken.value += "\n";
                                        }else {
                                            return Unexpected(new ParseError(lineNumber, this.i - lineIndex, "Use a backslash for multiline strings! (or use the backtick quote '`')"));
                                        }
                                    }else {
                                        escaped = false;
                                    }
                                }else if(str[this.i] == '\\') {
                                    //escape!
                                    this.i++; //consume \
                                    switch(str[this.i]) {
                                        case '0':
                                            stringToken.value += '\0';
                                            break;
                                        case '1':
                                        case '2':
                                        case '3':
                                        case '4':
                                        case '5':
                                        case '6':
                                        case '7':
                                        case '8':
                                        case '9':
                                        case 'x':
                                        case 'u':
                                            return Unexpected(new ParseError(lineNumber, this.i - lineIndex, "We're not doing all that fancy escape stuff bruh"));
                                            break;
                                        case '\'':
                                            stringToken.value += '\'';
                                            break;
                                        case '"':
                                            stringToken.value += '\"';
                                            break;
                                        case '\\':
                                            stringToken.value += '\\';
                                            break;
                                        case 'n':
                                            stringToken.value += '\n';
                                            break;
                                        case 'r':
                                            stringToken.value += '\r';
                                            break;
                                        case 'v':
                                            stringToken.value += '\v';
                                            break;
                                        case 't':
                                            stringToken.value += '\t';
                                            break;
                                        case 'b':
                                            stringToken.value += '\b';
                                            break;
                                        case 'f':
                                            stringToken.value += '\f';
                                            break;
                                        case '\r':
                                            if(str[this.i+1] == '\n') {
                                                //eval(`"\\\r\n"`);
                                                this.i++; //consume \r
                                                //[[fallthrough]]
                                            }else {
                                                stringToken.value += '\r';
                                                break;
                                            }
                                        case '\n':
                                            escaped = true;
                                            this.i--; //don't consume the newline!
                                            break;
                                        default:
                                            stringToken.value += str[this.i];
                                            break;
                                    }
                                    this.i++; //consume whatever character that was
                                }else if(char == '`' && str[this.i] == '$') {
                                    if(str[this.i+1] == '{') {
                                        const templateCharNumber = this.i - lineIndex;
                                        this.i+=2; //consume dollar and curly bracket
                                        //template
                                        const result = this.lex(str, true); // who knew making the lexer its own object would come in handy (i'm actually talking about using this.i)
                                        if(!result.has_value()) {
                                            return result;
                                        }
                                        tokens.push(new Token(lineNumber, templateCharNumber, TokenKind.TEMPLATE_EXPRESSION, result.value));
                                    }else {
                                        stringToken.value += str[this.i++];
                                    }
                                }else {
                                    stringToken.value += str[this.i++];
                                }
                            }
                            if(!ended) {
                                return Unexpected(new ParseError(lineNumber, this.i - lineIndex, "End of file reached before ending string quote!"));
                            }
                            if(tokens.length == 0 && stringToken.value == "use strict") { //lol
                                useStrict = true;
                            }
                            tokens.push(stringToken);
                            break;
                        }

                        case '?':
                            if(str[this.i] == '.') {
                                this.i++; //consume dot
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.OPTIONAL_CHAINING, "?."));
                            }else if(str[this.i] == '?') {
                                this.i++; //consume ?
                                if(str[this.i] == '=') {
                                    this.i++; //consume =
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.NULLISH_COALESCING_EQUALS, "??="));
                                }else {
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.NULLISH_COALESCING, "??"));
                                }
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.QUESTION, "?"));
                            }
                            break;

                        case ':':
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.COLON, ":"));
                            break;

                        case ';':
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.SEMICOLON, ";"));
                            break;

                        case '+':
                            if(str[this.i] == '+') {
                                this.i++; //consume +
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.INCREMENT, "++"));
                            }else if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.PLUS_EQUALS, "+="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.PLUS, "+"));
                            }
                            break;

                        case '-':
                            if(str[this.i] == '-') {
                                this.i++; //consume -
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.DECREMENT, "--"));
                            }else if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.MINUS_EQUALS, "-="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.MINUS, "-"));
                            }
                            break;

                        case '*':
                            if(str[this.i] == '*') {
                                this.i++; //consume *
                                if(str[this.i] == '=') {
                                    this.i++; //consume =
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.EXPONENTIATION_EQUALS, "**="));
                                }else {
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.EXPONENTIATION, "**"));
                                }
                            }else if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.MUL_EQUALS, "*="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.ASTERISK, "*"));
                            }
                            break;

                        case '%':
                            if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.REMAINDER_EQUALS, "%="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.REMAINDER, "%"));
                            }
                            break;

                        case '<':
                            if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.LESS_EQUAL, "<="));
                            }else if(str[this.i] == '<') {
                                this.i++; //consume <
                                if(str[this.i] == '=') {
                                    this.i++; //consume =
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_SHIFT_LEFT_EQUALS, "<<="));
                                }else {
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_SHIFT_LEFT, "<<"));
                                }
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.LESS_THAN, "<"));
                            }
                            break;

                        case '>':
                            if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.GREATER_EQUAL, ">="));
                            }else if(str[this.i] == '>') {
                                this.i++; //consume >
                                if(str[this.i] == '>') {
                                    this.i++; //consume >
                                    if(str[this.i] == '=') {
                                        this.i++; //consume =
                                        tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_UNSIGNED_SHIFT_RIGHT_EQUALS, ">>>="));
                                    }else {
                                        tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_UNSIGNED_SHIFT_RIGHT, ">>>"));
                                    }
                                }else {
                                    if(str[this.i] == '=') {
                                        this.i++; //consume =
                                        tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_SHIFT_RIGHT_EQUALS, ">>="));
                                    }else {
                                        tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_SHIFT_RIGHT, ">>"));
                                    }
                                }
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.GREATER_THAN, ">"));
                            }
                            break;

                        case '&':
                            if(str[this.i] == '&') {
                                this.i++; //consume &
                                if(str[this.i] == '=') {
                                    this.i++; //consume =
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.LOGICAL_AND_EQUALS, "&&="));
                                }else {
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.LOGICAL_AND, "&&"));
                                }
                            }else if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_AND_EQUALS, "&="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_AND, "&"));
                            }
                            break;

                        case '^':
                            if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_XOR_EQUALS, "^="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_XOR, "^"));
                            }
                            break;

                        case '|':
                            if(str[this.i] == '|') {
                                this.i++; //consume |
                                if(str[this.i] == '=') {
                                    this.i++; //consume =
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.LOGICAL_OR_EQUALS, "||="));
                                }else {
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.LOGICAL_OR, "||"));
                                }
                            }else if(str[this.i] == '=') {
                                this.i++; //consume =
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_OR_EQUALS, "|="));
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_OR, "|"));
                            }
                            break;

                        case '!':
                            if(str[this.i] == '=') {
                                this.i++; //consume =
                                if(str[this.i] == '=') {
                                    this.i++; //consume =
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.STRICT_NOT_EQUAL, "!=="));
                                }else {
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.NOT_EQUAL, "!="));
                                }
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.EXCLAMATION, "!"));
                            }
                            break;

                        case '=':
                            if(str[this.i] == '=') {
                                this.i++; //consume =
                                if(str[this.i] == '=') {
                                    this.i++; //consume =
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.STRICT_EQUAL, "==="));
                                }else {
                                    tokens.push(new Token(lineNumber, charNumber, TokenKind.EQUAL_EQUAL, "=="));
                                }
                            }else {
                                tokens.push(new Token(lineNumber, charNumber, TokenKind.EQUALS, "="));
                            }
                            break;

                        case ',':
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.COMMA, ","));
                            break;

                        case '~':
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.BITWISE_NOT, "~"));
                            break;

                        case '(':
                            depth.parenthesis++;
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.OPEN_PARENTHESIS, "("));
                            break;

                        case ')':
                            depth.parenthesis--;
                            if(depth.parenthesis < 0) {
                                return Unexpected(new ParseError(lineNumber, charNumber, "Extra closing parenthesis!"));
                            }
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.CLOSING_PARENTHESIS, ")"));
                            break;

                        case '[':
                            depth.bracket++;
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.OPEN_BRACKET, "["));
                            break;

                        case ']':
                            depth.bracket--;
                            if(depth.bracket < 0) {
                                return Unexpected(new ParseError(lineNumber, charNumber, "Extra closing bracket!"));
                            }
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.CLOSING_BRACKET, "]"));
                            break;

                        case '{':
                            depth.curly++;
                            tokens.push(new Token(lineNumber, charNumber, TokenKind.OPEN_CURLY_BRACKET, "{"));
                            break;

                            depth.curly--;

                                while(this.i < str.length && identifierRegex.test(str[this.i])) {

                                    }
                                }

                                tokens.push(tempToken);
                            }else {
                                return Unexpected(new ParseError(lineNumber, charNumber, `Unexpected character '${char}'`));
                            }
                            break;
                    }
                }

                    return Unexpected(new ParseError(lineNumber, 1, `End of ${readingTemplate ? "template" : "file"} reached without closing parenthesis!`));
                }
                if(depth.bracket != 0) {
                    return Unexpected(new ParseError(lineNumber, 1, `End of ${readingTemplate ? "template" : "file"} reached without closing bracket!`));
                }
                if(depth.curly != 0) {
                    return Unexpected(new ParseError(lineNumber, 1, `End of ${readingTemplate ? "template" : "file"} reached without closing curly bracket!`));
                }

                return new Expected(tokens);
            }
