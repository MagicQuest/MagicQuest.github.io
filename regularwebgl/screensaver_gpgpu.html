    <script id="vertex-shader" type="glsl">#version 300 es
        //using these defines because i'm LAZY!
        #define attribute in
        #define varying out
        #define texture2D texture

        attribute vec4 a_position;
        attribute vec2 a_texCoord;

        uniform mat4 u_matrix;
        uniform sampler2D objectTex;
        uniform float objectCount;
        uniform float u_maxTextureSize;

        varying vec2 v_texCoord;
        varying vec4 v_position;

        flat out int v_id;
        void main() {
            //i could use points here but points are a little weird lol
            //gl_PointSize = 12.0;

            //vec2 offset = texture2D(objectTex, vec2(float(gl_InstanceID)/objectCount, 0.0)).xy;
            vec2 offset = texelFetch(objectTex, ivec2(int(min(float(gl_InstanceID), u_maxTextureSize-1.0)), int(floor(float(gl_InstanceID)/u_maxTextureSize))), 0).xy;

            v_texCoord = a_texCoord;
            gl_Position = u_matrix*(a_position) + vec4((offset-0.5)*2.0, 0.0, 0.0);
            v_position = gl_Position;
            v_id = gl_InstanceID;
        }
    </script>
    <script id="fragment-shader" type="glsl">#version 300 es
        precision highp float;

        //using these defines because i'm LAZY!
        #define varying in
        #define gl_FragColor fragColor

        uniform float iTime;
        varying vec2 v_texCoord;
        varying vec4 v_position;
        
        flat in int v_id;

        out vec4 gl_FragColor;

        void main() {
            const float tolerance = 0.1; //0.05;
            float x = (fract(iTime/(255.0*2.0))*2.0);
            float color = abs(mod(x-1.0, 2.0)-1.0); //https://www.desmos.com/calculator/cjsex4p7ee

            //if(v_texCoord.x < tolerance || v_texCoord.x > 1.0-tolerance || v_texCoord.y < tolerance || v_texCoord.y > 1.0-tolerance) {
            //    gl_FragColor = vec4(v_texCoord, color, 1.0);
            //    //gl_FragColor = vec4(vec3(0.0), 1.0);
            //    //gl_FragColor = vec4(1.0, 1.0, color, 1.0);
            //}else {
            //    gl_FragColor = vec4(color, v_position.x/2.0 + 0.5, v_position.y/2.0 + 0.5, 1.0);
            //}

            gl_FragColor = vec4(v_texCoord, color, 1.0);
        }
    </script>
    <script id="vertex-shader-gpgpu" type="glsl">#version 300 es
        //using these defines because i'm LAZY!
        #define attribute in

        attribute vec4 a_position;

        void main() {
            gl_Position = a_position;
        }
    </script>
    <script id="fragment-shader-gpgpu" type="glsl">#version 300 es
        precision highp float;

        //using these defines because i'm LAZY!
        #define gl_FragColor fragColor
        #define texture2D texture

        //uniform sampler2D positionTex;
        //uniform sampler2D velocityTex;

        //actually we can just use one texture and have the position in the xy and the velocity in the zw
        uniform sampler2D objectTex;

        uniform vec2 iResolution;

        out vec4 gl_FragColor;
 
        void main() {
            //vec2 uv = gl_FragCoord.xy / iResolution.xy;
            //vec4 data = texture2D(objectTex, uv + (0.5 / iResolution.xy));
            //vec2 pos = (data.xy-0.5) + (data.zw-0.5); //(0.5-data.zw)*2.0;

            vec4 data = texelFetch(objectTex, ivec2(gl_FragCoord.xy), 0);

            vec2 pos = data.xy + (0.5-data.zw)/2.0;

            if(pos.x < 1.0/255.0) {
                pos.x = 1.0/255.0;
                data.z = 1.0-data.z;
                //data.z *= -1.0;
            }else if(pos.x > 254.0/255.0) {
                pos.x = 254.0/255.0;
                data.z = 1.0-data.z;
                //data.z *= -1.0;
            }else if(pos.y < 1.0/255.0) {
                pos.y = 1.0/255.0;
                data.w = 1.0-data.w;
                //data.w *= -1.0;
            }else if(pos.y > 254.0/255.0) {
                pos.y = 254.0/255.0;
                data.w = 1.0-data.w;
                //data.w *= -1.0;
            }

            //outputting new position
            //gl_FragColor = vec4(pos + 0.5, data.zw);
            gl_FragColor = vec4(pos, data.zw);
        }
    </script>
