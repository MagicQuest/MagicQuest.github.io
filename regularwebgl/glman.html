    <script id="vertex-shader" type="glsl">
        attribute vec4 a_position;
        attribute vec3 a_vertexColor;
        attribute vec2 a_textureCoord;
        varying vec3 v_color; //layout (location = 0) in vec3 v_color;
        varying vec2 v_textureCoord;
        void main() { 
            v_color = a_vertexColor;
            v_textureCoord = a_textureCoord;
            gl_Position = a_position;
        }
    </script>
    <script id="fragment-shader" type="glsl">precision highp float;
        varying vec3 v_color;
        varying vec2 v_textureCoord;
        uniform vec2 iResolution;
        uniform sampler2D iChannel0;
        void main() {
            vec2 uv = gl_FragCoord.xy/iResolution.xy;
            // gl_FragColor = vec4(v_color, 1.0);
            gl_FragColor = vec4(texture2D(iChannel0, v_textureCoord).xyz, 1.0);
        }
    </script>

            gl_FragColor = vec4(texture2D(iChannel0, uv).xyz, 1.0);
        }

            function createProgram(vertex, fragment) {
                const vshader = gl.createShader(gl.VERTEX_SHADER);
                gl.shaderSource(vshader, vertex);
                gl.compileShader(vshader);
                if(!gl.getShaderParameter(vshader, gl.COMPILE_STATUS)) {
                    displayError(gl.getShaderInfoLog(vshader));
                    gl.deleteShader(vshader);
                    return false;
                }

                const fshader = gl.createShader(gl.FRAGMENT_SHADER);

                    gl.deleteShader(vshader);
                    gl.deleteShader(fshader);
                    return false;

                gl.attachShader(program, fshader);
                gl.linkProgram(program);
                if(!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    displayError(gl.getProgramInfoLog(program));
                    gl.deleteProgram(program);
                    gl.deleteShader(vshader);
                    gl.deleteShader(fshader);
                    return false;
                }

                return program;
            }

            function grabVertex(event) {
                //if(event.buttons) {

                    //debugger;
                    const halfwidth = gl.canvas.width/2;
                    const halfheight = gl.canvas.height/2;

                    const clipspaceX = (event.offsetX-halfwidth)/halfwidth;
                    const clipspaceY = (halfheight-event.offsetY)/halfheight;

                    let closestPos;
                    let closestMag = Infinity;
                    for(let i = 0; i < vertexPositions.length; i+=2) {
                        const fx = vertexPositions[i];
                        const fy = vertexPositions[i+1];
                        const mag = Math.sqrt((fx-clipspaceX)**2 + (fy-clipspaceY)**2);
                        if(mag < closestMag) {
                            closestMag = mag;
                            closestPos = i;
                        }
                    }

                    //unfortunately we now gotta put our mouse position into clip space
                    vertexPositions[closestPos] = clipspaceX;
                    vertexPositions[closestPos+1] = clipspaceY;

                    //gl.useProgram(program);

                    gl.bindBuffer(gl.ARRAY_BUFFER, vertexPosBuffer);

                    //@Bound(vertexPosBuffer)
                    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertexPositions), gl.STREAM_DRAW);
                    draw();
                //}
            }
