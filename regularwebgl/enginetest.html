	<script id="lut-vertex-shader" type="glsl">#version 300 es
		layout(location=0) in vec4 a_position;
		layout(location=2) in vec2 a_texCoord;

		out vec2 v_texCoord;
		void main() {
			v_texCoord = a_texCoord;
			gl_Position = a_position;
		}
	</script>
	<script id="lut-fragment-shader" type="glsl">#version 300 es
		precision highp float;
		uniform sampler2D u_input;
		uniform sampler2D u_lut;
		in vec2 v_texCoord;
		out vec4 fragColor;
		void main() {
			vec4 input_pixel = texture(u_input, v_texCoord);
			//int x = int(input_pixel.r*64.0) + (int(input_pixel.b*64.0) % 8)*64;
			//int y = int(input_pixel.g*64.0) + (int(input_pixel.b*8)*64.0);
			//vec4 lookup = texelFetch(u_lut, ivec2(x, y));
			//ok wait i'm starting to think i should't use texelFetch because ts is imprecise as fuck
			//float flipb = 1.0-input_pixel.b;
			//float x = input_pixel.r/8.0 + fmod(flipb/64.0, 1/8)*8; //fmod(input_pixel.b, 1.0);
			//float y = input_pixel.g/8.0 + ; //input_pixel.b
			//ok i got it
			float b = min(input_pixel.b, 511.0/512.0);
			float x = (input_pixel.r/8.0 - ceil(input_pixel.r)/512.0) + floor(mod(b*64.0, 8.0))/8.0; //oh wait it's mod instead of fmod lol
			float y = 1.0-(input_pixel.g + floor(b*8.0))/8.0;
			x += 0.5/512.0;
			y -= 0.5/512.0;
			vec4 lookup = vec4(texture(u_lut, vec2(x, y)).xyz, input_pixel.a);
			fragColor = lookup;
		}
	</script>

		function unlitShaderFactory(instancing, useTextureArray) {

			const hereisthepartwhereisayifthereisinstancingornot = instancing ? "#define INSTANCING" : ""; //honestly i could just use javascript to manipulate the glsl instead of inserting #define directives
			const doUseTextureArray = useTextureArray ? "#define USE_TEXTURE_ARRAY" : "";
			const monolithCustomVertexShader = `#version 300 es
				${hereisthepartwhereisayifthereisinstancingornot}
				${doUseTextureArray}

				layout(location=0) in vec4 a_position;
				layout(location=1) in vec3 a_normal;
				layout(location=2) in vec2 a_texCoord;

				#ifdef INSTANCING
				layout(location=3) in vec4 ai_color;
				layout(location=4) in mat4 ai_matrix;
				#define WORLD_MATRIX ai_matrix
				#else
				uniform mat4 u_worldMatrix;
				#define WORLD_MATRIX u_worldMatrix
				#endif
				uniform mat4 u_viewProjectionMatrix;

				#ifdef USE_TEXTURE_ARRAY
				layout(location=8) in float a_texId;
				#endif

				out vec3 v_normal;
				out vec2 v_texCoord;
				#ifdef INSTANCING
				out vec4 v_color;
				#endif
				#ifdef USE_TEXTURE_ARRAY
				out float v_texId;
				#endif
				void main() {
					v_normal = a_normal;
					v_texCoord = a_texCoord;
					#ifdef INSTANCING
					v_color = ai_color;
					#endif
					#ifdef USE_TEXTURE_ARRAY
					v_texId = a_texId;
					#endif

					vec4 position = u_viewProjectionMatrix*WORLD_MATRIX*a_position;
					float zToDivideBy = 1.0 + position.z*2.0;
					gl_Position = vec4(position.xyz, zToDivideBy);
				}
			`;

			const monolithCustomFragmentShader = `#version 300 es
				${hereisthepartwhereisayifthereisinstancingornot}
				${doUseTextureArray}

				precision highp float;

				#ifndef INSTANCING
				uniform vec4 u_color;
				#define OBJECT_COLOR u_color
				#endif

				#ifdef USE_TEXTURE_ARRAY
				uniform highp sampler2DArray u_texture;
				#else
				uniform sampler2D u_texture;
				#endif

				in vec3 v_normal;
				in vec2 v_texCoord;
				#ifdef INSTANCING
				in vec4 v_color;
				#define OBJECT_COLOR v_color
				#endif
				#ifdef USE_TEXTURE_ARRAY
				in float v_texId;
				#endif
				
				out vec4 fragColor;
				void main() {
					//fragColor = OBJECT_COLOR;

					fragColor = texture(u_texture, v_texCoord)*OBJECT_COLOR;
				}
			`;

			return [monolithCustomVertexShader, monolithCustomFragmentShader];
		}

				#ifdef INSTANCING
				layout(location=3) in vec4 ai_color;

				#define WORLDMATRIX ai_matrix
				#else
				uniform mat4 u_worldMatrix;
				#define WORLDMATRIX u_worldMatrix
				#endif

				uniform mat4 u_viewProjectionMatrix;
				
				out vec3 v_normal;
				out vec2 v_texCoord;
				#ifdef INSTANCING
				out vec4 v_color;
				#endif
				void main() {
					v_normal = a_normal;
					v_texCoord = a_texCoord;
					#ifdef INSTANCING
					v_color = ai_color;
					#endif
					vec4 position = u_viewProjectionMatrix*WORLDMATRIX*a_position;
					float zToDivideBy = 1.0 + position.z*2.0;
					gl_Position = vec4(position.xyz, zToDivideBy);
				}
			`;

			const monolithFragmentShader = `#version 300 es
				${instancing ? "#define INSTANCING" : ""}
				${useTextureArray ? "#define USE_TEXTURE_ARRAY" : ""}

				precision highp float;

				#ifndef INSTANCING

					//fragColor = vec4(v_normal, 1.0)*OBJECT_COLOR;
				}
			`;

			return [monolithVertexShader, monolithFragmentShader];
		}

		gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
		gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
		gl.texImage2D(gl.TEXTURE_2D, 0, gl.DEPTH_COMPONENT24, gl.canvas.width, gl.canvas.height, 0, gl.DEPTH_COMPONENT, gl.UNSIGNED_INT, null);
		gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.TEXTURE_2D, framebufferDepthTexture, 0);

		gl.bindFramebuffer(gl.FRAMEBUFFER, null);
	
		const camera = new Camera([0.0, 0.0, 3.0]); 

		/*function animate(t) {
		    Renderer.draw(gl, t, camera);
		    requestAnimationFrame(animate);
		}*/

		function draw() {
			gl.bindFramebuffer(gl.FRAMEBUFFER, framebuffer);
			Renderer.draw(gl, 0, camera);
			//draw();
			gl.bindFramebuffer(gl.FRAMEBUFFER, null);

			if(!lutTexture) {
				gl.useProgram(showProgram);
			}else {
				gl.useProgram(lutProgram);
				gl.activeTexture(gl.TEXTURE1);
				gl.bindTexture(gl.TEXTURE_2D, lutTexture);
			}
			gl.activeTexture(gl.TEXTURE0);
			gl.bindTexture(gl.TEXTURE_2D, framebufferTexture);
			glPolyfill.bindVertexArray(gl, lutVAO);
			gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
		}
		
		function handleMouseMovement(event) {
			camera.handleMouseMovement(event.movementX, event.movementY);
			draw();
		}

		function handleKeyboardInput(event) {
			/*if(event.key.toLowerCase() == "e") {
				//pointLightPosition = camera.position; //oh my i was taking the position by reference (this shouldn't be a problem anymore but we'll use slice just in case)
				pointLightPosition = camera.position.slice();
				draw();
			}*/
			if(camera.handleKeyboardInput(event)) {
				draw();
				//Renderer.draw(gl, 0, camera);
			}
		}

		document.addEventListener("pointerlockchange", function(event) {
			if(document.pointerLockElement == canvas) {
				document.addEventListener("mousemove", handleMouseMovement);
				document.addEventListener("keydown", handleKeyboardInput);
			}else {
				document.removeEventListener("mousemove", handleMouseMovement);
				document.removeEventListener("keydown", handleKeyboardInput);
			}
		});

		canvas.addEventListener("mousedown", function(event) {
			canvas.requestPointerLock();
		});

		//animate();
		//Renderer.draw(gl, 0, camera);
	</script>
</body>
