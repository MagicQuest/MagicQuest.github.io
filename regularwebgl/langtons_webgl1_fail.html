	<script id="vertex-shader" type="x-shader/x-vertex">
		attribute vec4 a_position;
		//attribute vec2 a_texCoord;
		//varying vec2 v_texCoord;

		void main() {
		    //v_texCoord = a_texCoord;
			gl_Position = a_position;
		}
	</script>
	<script id="fragment-shader" type="x-shader/x-fragment">
		#ifdef GL_FRAGMENT_PRECISION_HIGH
			precision highp float;
		#else
			precision mediump float;
		#endif

		uniform sampler2D u_texture;
		varying vec2 v_texCoord;

		//using a struct for no reason lol
		struct Ant {
			vec2 position;
			vec2 facing;
		};

		//uniform Ant u_ant;

		uniform sampler2D u_ant;
		uniform vec2 u_bounds;

		void main() {
			//gl_FragColor = texture2D(u_texture, v_texCoord);
			//gl_FragColor = vec4(1.0-gl_FragCoord.x/u_bounds.x, gl_FragCoord.x/u_bounds.x, 0.0, 1.0);
			vec2 uv = gl_FragCoord.xy / u_bounds;
			float color = texture2D(u_texture, uv).x;
			Ant ant;
			//			   trunc
			ant.position = floor(texture2D(u_ant, vec2(0.0 + 1.0/4.0, 0.5)).xy * u_bounds) + vec2(0.5, 0.5);
			//bruh, gl_FragCoord has a range of (0.5, width-0.5) https://stackoverflow.com/questions/16825412/what-is-the-range-of-gl-fragcoord
			if(ant.position == gl_FragCoord.xy) {
				color = 1.0-color; //flip
				//gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
				//return;
			}
			//color = 0.0;
			gl_FragColor = vec4(vec3(color), 1.0);
		}
	</script>
	<script id="ant-fragment-shader" type="x-shader/x-fragment">
		#ifdef GL_FRAGMENT_PRECISION_HIGH
			precision highp float;
		#else
			precision mediump float;
		#endif

		#define MATH_PI 3.14159265358979323846264338327950288419716939937510582097494459230781

		uniform sampler2D u_texture;
		uniform vec2 u_bounds;
		uniform sampler2D u_ant;
		void main() {
			if(gl_FragCoord.x == 0.5) {
				gl_FragColor = texture2D(u_ant, vec2(1.0/2.0 + 1.0/4.0, 0.5));
				//gl_FragColor = vec4(0.0, 0.0, 0.0, 0.0);
				return;
			}
			vec4 ant = texture2D(u_ant, vec2(1.0/2.0 + 1.0/4.0, 0.5));
			vec2 position = floor(ant.xy*u_bounds);
			vec2 uv = position/u_bounds;
			float PI2 = MATH_PI*2.0;
			float theta = floor((ant.z*PI2)/(MATH_PI/2.0) + 0.5)*(MATH_PI/2.0);
			//          round
			float map = floor(texture2D(u_texture, uv).x + 0.5)*2.0 - 1.0;
			//theta += (90*MATH_PI/180.0)*map;
			theta = mod(theta + PI2 + (-map*90.0*MATH_PI/180.0), PI2);
			//			round
			//position += floor(vec2(cos(theta)+0.5, sin(theta)+0.5));
			//why is this position += not working?
			//lowkey... i don't think we have the precision for allat
			//further, webgl1 only guarantees RGBA/UNSIGNED_BYTE per https://registry.khronos.org/webgl/specs/latest/1.0/#FBO_ATTACHMENTS
			//i knew i should've used webgl2!
			position += vec2(cos(theta), sin(theta));
			gl_FragColor = vec4(position.xy/u_bounds, theta/PI2, sin(theta)); 
		}
	</script>
