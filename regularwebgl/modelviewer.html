    <script id="vertex-shader" type="glsl">#version 300 es
        layout(location=0) in vec4 a_position;
		layout(location=1) in vec3 a_normal;
		layout(location=2) in vec2 a_texCoord;
		uniform mat4 u_localMatrix;
		uniform mat4 u_viewMatrix;
		out vec3 v_normal;
		out vec2 v_texCoord;
		out float v_z;
        void main() {
			v_normal = mat3(u_localMatrix)*a_normal;
			v_texCoord = a_texCoord;
			//v_z = a_position.z; //interesting effect that.
			vec4 position = u_viewMatrix*u_localMatrix*a_position;
			float zToDivideBy = 1.0 + position.z*2.0; //not a_position >:[
			gl_Position = vec4(position.xyz, zToDivideBy); //not a_position >:[
			v_z = position.z;
        }
    </script>
    <script id="fragment-shader" type="glsl">#version 300 es
		precision highp float;

		out vec4 fragColor;

		uniform sampler2D u_tex;
		uniform bool u_bNormals;
		uniform bool u_bTexCoords;
		uniform vec4 u_defaultColor;
		uniform vec3 u_reverseLightDir;

		in vec3 v_normal;
		in vec2 v_texCoord;
		in float v_z;
        void main() {
			vec4 color = u_defaultColor;
			if(u_bTexCoords) {
				color = texture(u_tex, v_texCoord);
			}
			if(u_bNormals) {
				vec3 n = normalize(v_normal);
				color.rgb *= dot(n, u_reverseLightDir);
				//color.rgb = n;
			}
			//fragColor = mix(color, vec4(1.0, 0.0, 1.0, color.a), v_z); //uhh, that's not fog lol
			fragColor = color;
			//float z = (v_z+1.4)/10.0; // mapped to 0 -> 1 where 0 should be the closest? (wait a second v_z is set to the final position.z so this is in world space!)
			//fragColor = mix(color, vec4(192.0/255.0, 215.0/255.0, 1.0, color.a), min(pow(z, 5.0), 1.0));
			//fragColor = vec4(vec3(pow(z, 5.0)), 1.0);
        }
    </script>

	<script>
		class ModelObject {
			VAO;
			vertexBuffer;

			matrix = m4.identity();
			color = undefined;
			constructor(vertices) {
				debugger;
				this.VAO = glPolyfill.createVertexArray(gl);
				glPolyfill.bindVertexArray(gl, this.VAO);
				this.vertexBuffer = new glBuffer(gl, gl.ARRAY_BUFFER);
				this.vertexBuffer.set(new Float32Array(vertices), gl.STATIC_DRAW);
				//assuming attrib location 0 is a_position
				//@Bound(this.vertexBuffer)
				gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 0, 0);
				gl.enableVertexAttribArray(0);
			}
			//binds the ModelObject's VAO
			draw(updateMatrixCallback, updateColorCallback) {
				updateMatrixCallback(this.matrix);
				if(this.color != undefined) {
					updateColorCallback(this.color);
				}
				glPolyfill.bindVertexArray(gl, this.VAO);
			}
			hasNormals() {}; // = 0;
			hasTexCoords() {}; // = 0;
			destroy() {
				glPolyfill.deleteVertexArray(gl, this.VAO);
				this.vertexBuffer.destroy();
			}
		}

		class IndexedModelObject extends ModelObject {
			indexBuffer;
			type;
			constructor(vertices, indices, suggested_type) {
				super(vertices);
				//this.VAO bound from super constructor
				this.indexBuffer = new glBuffer(gl, gl.ELEMENT_ARRAY_BUFFER);
				let arraytype;
				switch(suggested_type) {
					case gl.UNSIGNED_BYTE:
						arraytype = Int8Array;
						break;
					case gl.UNSIGNED_SHORT:
						arraytype = Int16Array;
						break;
					case gl.UNSIGNED_INT:
						arraytype = Int32Array;
						break;
				}
				//damn it bruh... that arraytype shit was wrong...
				this.indexBuffer.set(new arraytype(indices), gl.STATIC_DRAW);
				this.type = suggested_type;
			}
			draw(updateMatrixCallback, updateColorCallback) {
				super.draw(updateMatrixCallback, updateColorCallback); //binds the vao for us
				gl.drawElements(gl.TRIANGLES, this.indexBuffer.length, this.type, 0);
			}
			hasNormals() {
				return false;
			}
			hasTexCoords() {
				return false;
			}
			destroy() {
				super.destroy();
				this.indexBuffer.destroy();
			}
		}

		class FancyModelObject extends ModelObject {
			normalBuffer;
			texCoordBuffer;
			constructor(vertices, normals, texcoords) {
				super(vertices); //super constructor binds our VAO
				
				this.normalBuffer = new glBuffer(gl, gl.ARRAY_BUFFER);
				this.normalBuffer.set(new Float32Array(normals), gl.STATIC_DRAW);
				//assuming normals will be at attrib location 1
				gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 0, 0);
				gl.enableVertexAttribArray(1);

				this.texCoordBuffer = new glBuffer(gl, gl.ARRAY_BUFFER);
				this.texCoordBuffer.set(new Float32Array(texcoords), gl.STATIC_DRAW);
				//assuming texcoords will be at attrib location 2
				gl.vertexAttribPointer(2, 2, gl.FLOAT, false, 0, 0);
				gl.enableVertexAttribArray(2);
			}
			draw(updateMatrixCallback, updateColorCallback) {
				super.draw(updateMatrixCallback, updateColorCallback); //binds the vao for us
				gl.drawArrays(gl.TRIANGLES, 0, this.vertexBuffer.length);
			}
			hasNormals() {
				return this.normalBuffer.length!=0;
			}
			hasTexCoords() {
				return this.texCoordBuffer.length!=0;
			}
			destroy() {
				super.destroy();
				this.normalBuffer.destroy();
				this.texCoordBuffer.destroy();
			}
		}

		const objects = [];

		function spawnObj(contents, force_normals = false) {
			const info = Model.loadObj(gl, contents, force_normals ? true : false); //verbose
			let model;
			if(info.indices.length) {
				model = new IndexedModelObject(info.vertices, info.indices, info.suggested_type);
			}else {
				if(info.normals.length == 0 && force_normals) {
					info.normals = Model.calculateNormals(info.vertices);
				}
				model = new FancyModelObject(info.vertices, info.normals, info.texcoords);
			}
			objects.push(model);
			return model;
		}

		async function promptForObj() {
			const [file] = await showOpenFilePicker({multiple: false, types: [
			    {description: "OBJ files", accept: {"model/obj": [".obj"]}}
			]});
			const data = await file.getFile();
			const contents = await data.text();
			spawnObj(contents);
			draw();
		}
	</script>

		function updateObjectMatrix(objMatrix) {
			program.setUniformMatrix("u_localMatrix", false, objMatrix);
		}

		function updateColor(color) {
			program.setUniform("u_defaultColor", new Float32Array(color));
		}

		let lastNormal = 0;
		let lastTex = 0;

        function draw() {
			gl.viewport(0, 0, gl.canvas.width, gl.canvas.height); //technically don't need to call this in le draw func

			//gl.clearColor(1.0, 0.0, 1.0, 1.0);
			gl.clearColor(192/255, 215/255, 1.0, 1.0);
			gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

			const projection = m4.perspective(60*Math.PI/180, gl.canvas.clientWidth/gl.canvas.clientHeight, 1, 2000);
			const viewMatrix = m4.inverse(camera.matrix);
			const viewProjectionMatrix = m4.translate(m4.multiply(projection, viewMatrix), 0.0, 0.0, 0.0);

			program.setUniformMatrix("u_viewMatrix", false, viewProjectionMatrix);

			//gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
			//if i were smart i would sort these before hand so i'd only have to set the uniforms n**2 times
			for(const obj of objects) {
				let normal = obj.hasNormals();
				let tex = obj.hasTexCoords();
				if(normal != lastNormal) {
					lastNormal = normal;
					program.setUniform("u_bNormals", normal);
				}
				if(tex != lastTex) {
					lastTex = tex;
					program.setUniform("u_bTexCoords", tex);
				}
				obj.draw(updateObjectMatrix, updateColor);
			}
        }

		//theta = 0 -> right
		//theta = Math.PI/2 -> forward
		function cameraVector(theta, scale) {
			return [Math.cos(camera.rotation[1]+theta)*scale, 0.0, -Math.sin(camera.rotation[1]+theta)*scale];
		}

		function handleMouseMovement(event) {
			const horizontalRot = -event.movementX*Math.PI/180;
			const verticalRot = -event.movementY*Math.PI/180;
			camera.rotation[1] += horizontalRot/2;
			camera.rotation[0] += verticalRot/2;
			camera.build();
			draw();
		}

		function handleKeyboardInput(event) {
			let redraw = false;
			const key = event.key.toLowerCase();
			if(key == "w") {
				const forward = cameraVector(Math.PI/2, 0.1);
				m4.addVectors(camera.position, forward, camera.position);
				redraw = true;
			}else if(key == "s") {
				const backward = cameraVector(3*Math.PI/2, 0.1);
				m4.addVectors(camera.position, backward, camera.position);
				redraw = true;
			}else if(key == "d") {
				m4.addVectors(camera.position, cameraVector(0, 0.1), camera.position);
				redraw = true;
			}else if(key == "a") {
				m4.addVectors(camera.position, cameraVector(Math.PI, 0.1), camera.position);
				redraw = true;
			}else if(key == " ") {
				camera.position[1] += 0.1;
				redraw = true;
			}else if(key == "shift") {
				camera.position[1] -= 0.1;
				redraw = true;
			}

			if(key == "e") {
				//const backward = cameraVector(3*Math.PI/2, 0.1);
				//i give up lol
				const pitch = camera.rotation[0];
				const yaw = camera.rotation[1]+Math.PI/2;
				const forward = [
					Math.cos(yaw) * Math.cos(pitch),
					Math.sin(pitch),
					Math.sin(yaw+Math.PI) * Math.cos(pitch), //?
				];
				program.setUniform("u_reverseLightDir", new Float32Array(forward.map(v=>-v)));
				redraw = true;
			}

			if(redraw) {
				camera.build();
				draw();
			}
		}

		document.addEventListener("pointerlockchange", function(event) {
			if(document.pointerLockElement == canvas) {
				document.addEventListener("mousemove", handleMouseMovement);
				document.addEventListener("keydown", handleKeyboardInput);
			}else {
				document.removeEventListener("mousemove", handleMouseMovement);
				document.removeEventListener("keydown", handleKeyboardInput);
			}
		});

		canvas.addEventListener("mousedown", function(event) {
			canvas.requestPointerLock();
		});
